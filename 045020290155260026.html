<style>
  :root {
    --navy:   #0f1f3d;
    --blue:   #1a3a6b;
    --accent: #2d7dd2;
    --toll:   #e8a020;
    --green:  #2ecc71;
    --red:    #e74c3c;
    --bg:     #f0f4f8;
    --panel:  #ffffff;
    --text:   #1a2840;
    --muted:  #6b7a99;
    --border: #d0dae8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  /* HEADER */
  #header {
    background: var(--navy);
    padding: 0 20px;
    height: 52px;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-shrink: 0;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .logo { font-family:'DM Mono',monospace; font-size:13px; font-weight:500; color:var(--accent); letter-spacing:0.08em; text-transform:uppercase; white-space:nowrap; }
  .sep  { width:1px; height:24px; background:rgba(255,255,255,0.15); flex-shrink:0; }
  .header-meta { font-size:11px; color:rgba(255,255,255,0.45); font-family:'DM Mono',monospace; white-space:nowrap; }
  .route-label { font-size:13px; font-weight:500; color:white; flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .driver-badge { background:rgba(45,125,210,0.25); border:1px solid rgba(45,125,210,0.4); color:#7ab3e8; font-size:11px; font-weight:500; padding:3px 10px; border-radius:20px; white-space:nowrap; }

  /* NAV */
  #nav {
    background: var(--blue);
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    flex-shrink: 0;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    padding: 0 16px;
  }
  .nav-btn {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    color: white;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    padding: 5px 16px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.15s;
    white-space: nowrap;
  }
  .nav-btn:hover { background: rgba(255,255,255,0.2); }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }
  #nav-counter { font-family:'DM Mono',monospace; font-size:12px; color:rgba(255,255,255,0.7); min-width:80px; text-align:center; }
  #nav-planid  { font-family:'DM Mono',monospace; font-size:11px; color:rgba(255,255,255,0.45); }

  /* MAIN */
  #main { display:flex; flex:1; overflow:hidden; }

  /* SIDEBAR */
  #sidebar { width:290px; flex-shrink:0; background:var(--panel); border-right:1px solid var(--border); display:flex; flex-direction:column; overflow-y:auto; }
  .sidebar-section { padding:14px 18px; border-bottom:1px solid var(--border); }
  .sidebar-section:last-child { border-bottom:none; }
  .section-label { font-size:10px; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; color:var(--muted); margin-bottom:10px; }

  /* STATS */
  .stat-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .stat-card { background:var(--bg); border-radius:8px; padding:10px 12px; border:1px solid var(--border); }
  .stat-card.full { grid-column:1/-1; }
  .stat-card.highlight { background:#fff8e6; border-color:#f0c060; }
  .stat-value { font-family:'DM Mono',monospace; font-size:18px; font-weight:500; color:var(--text); line-height:1; }
  .stat-card.highlight .stat-value { color:#b07000; }
  .stat-label { font-size:10px; color:var(--muted); margin-top:3px; }

  /* STOPS */
  .stop-list { display:flex; flex-direction:column; }
  .stop-item { display:flex; align-items:flex-start; gap:10px; position:relative; padding:7px 0; }
  .stop-item:not(:last-child)::after { content:''; position:absolute; left:10px; top:26px; bottom:-7px; width:2px; background:var(--border); }
  .stop-dot { width:22px; height:22px; border-radius:50%; border:2px solid var(--accent); background:white; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:600; color:var(--accent); flex-shrink:0; z-index:1; }
  .stop-item:first-child .stop-dot { background:var(--accent); color:white; }
  .stop-item:last-child  .stop-dot { background:var(--navy); border-color:var(--navy); color:white; }
  .stop-name   { font-size:12px; font-weight:500; padding-top:2px; }
  .stop-coords { font-family:'DM Mono',monospace; font-size:10px; color:var(--muted); margin-top:1px; }

  /* STATUS */
  .status-badge { display:inline-flex; align-items:center; gap:6px; padding:5px 11px; border-radius:20px; font-size:11px; font-weight:600; }
  .status-ok   { background:#eafaf1; color:#1a8a45; border:1px solid #82e0aa; }
  .status-warn { background:#fff8e6; color:#b07000; border:1px solid #f0c060; }
  .status-err  { background:#fdf0f0; color:#c0392b; border:1px solid #f1948a; }
  .status-dot  { width:6px; height:6px; border-radius:50%; background:currentColor; }

  /* MAP */
  #map-container { flex:1; position:relative; }
  #map { width:100%; height:100%; }

  /* LOADING */
  #map-loading { position:absolute; inset:0; background:rgba(15,31,61,0.7); display:flex; align-items:center; justify-content:center; z-index:1000; color:white; font-size:13px; gap:10px; }
  .spinner { width:28px; height:28px; border:3px solid rgba(255,255,255,0.2); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; flex-shrink:0; }
  @keyframes spin { to { transform:rotate(360deg); } }

  /* FOOTER */
  #footer { height:30px; background:var(--navy); display:flex; align-items:center; padding:0 18px; gap:16px; flex-shrink:0; }
  #footer span { font-size:10px; color:rgba(255,255,255,0.4); font-family:'DM Mono',monospace; }
  #footer .f-accent { color:rgba(255,255,255,0.7); }
</style>

<script>
// ── DATE INJECTATE DE VBA ──────────────────────────────────
const ROUTES = window._ROUTES || [];
const META   = window._META   || {};

// ── STATE ──────────────────────────────────────────────────
let currentIdx = 0;
let map        = null;
let routeLayerGroup = null;
let markerLayerGroup = null;

// ── INIT ───────────────────────────────────────────────────
document.getElementById('h-selfbill').textContent = META.selfbill || '—';
document.getElementById('f-total').textContent =
  'Total diferente: ' + (META.totalDiff || '0') + ' EUR · ' + (META.totalRoutes || 0) + ' rute';
document.getElementById('f-ts').textContent = new Date().toLocaleString('ro-RO');

// Initializeaza harta o singura data
map = L.map('map', {zoomControl: true}).setView([51.5, 8.0], 6);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap contributors', maxZoom: 19
}).addTo(map);
routeLayerGroup  = L.layerGroup().addTo(map);
markerLayerGroup = L.layerGroup().addTo(map);

if (ROUTES.length > 0) {
  showRoute(0);
} else {
  document.getElementById('map-loading').innerHTML = '<div style="text-align:center"><div style="font-size:32px">⚠️</div><div style="margin-top:8px">Nu exista rute de afisat.</div></div>';
}

// ── NAVIGARE ───────────────────────────────────────────────
function navigate(dir) {
  const newIdx = currentIdx + dir;
  if (newIdx < 0 || newIdx >= ROUTES.length) return;
  showRoute(newIdx);
}

// ── AFISEAZA RUTA ──────────────────────────────────────────
function showRoute(idx) {
  currentIdx = idx;
  const r = ROUTES[idx];

  // Nav buttons
  document.getElementById('btn-prev').disabled = idx === 0;
  document.getElementById('btn-next').disabled = idx === ROUTES.length - 1;
  document.getElementById('nav-counter').textContent = (idx + 1) + ' / ' + ROUTES.length;
  document.getElementById('nav-planid').textContent  = r.planId || '';

  // Header
  document.getElementById('h-route').textContent = r.cities.join(' \u2192 ');
  const db = document.getElementById('h-driver');
  if (r.driver) { db.textContent = r.driver; db.style.display = 'inline-flex'; }
  else db.style.display = 'none';

  // Statistici
  document.getElementById('s-toll').textContent = r.totalToll > 0 ? r.totalToll.toFixed(2) + ' EUR' : '0.00 EUR';
  document.getElementById('s-dist').textContent = r.totalKm > 0 ? r.totalKm + ' km' : '—';

  if (r.dfds > 0) {
    document.getElementById('s-dfds-card').style.display = '';
    document.getElementById('s-dfds').textContent = r.dfds.toFixed(2) + ' EUR';
  } else {
    document.getElementById('s-dfds-card').style.display = 'none';
  }

  if (r.dfdsKm > 0) {
    document.getElementById('s-dfds-km-card').style.display = '';
    document.getElementById('s-dfds-km').textContent = r.dfdsKm + ' km';
  } else {
    document.getElementById('s-dfds-km-card').style.display = 'none';
  }

  if (r.dfds > 0 && r.totalToll > 0) {
    const diff = r.dfds - r.totalToll;
    document.getElementById('s-diff-card').style.display = '';
    const de = document.getElementById('s-diff');
    de.textContent = (diff >= 0 ? '+' : '') + diff.toFixed(2) + ' EUR';
    de.style.color = Math.abs(diff) / r.dfds <= 0.05 ? '#1a8a45' : diff > 0 ? '#b07000' : '#c0392b';
  } else {
    document.getElementById('s-diff-card').style.display = 'none';
  }

  if (r.totalKm > 0 && r.dfdsKm > 0) {
    const dkm = r.dfdsKm - r.totalKm;
    document.getElementById('s-diff-km-card').style.display = '';
    const dkmEl = document.getElementById('s-diff-km');
    dkmEl.textContent = (dkm >= 0 ? '+' : '') + dkm + ' km';
    dkmEl.style.color = Math.abs(dkm) <= r.dfdsKm * 0.1 ? '#1a8a45' : dkm > 0 ? '#b07000' : '#c0392b';
  } else {
    document.getElementById('s-diff-km-card').style.display = 'none';
  }

  // Status
  const statusSection = document.getElementById('status-section');
  if (r.dfds > 0 && r.totalToll > 0) {
    const diff = r.dfds - r.totalToll;
    const pct  = Math.abs(diff) / r.dfds;
    let sh = '';
    if (pct <= 0.05)   sh = '<div class="status-badge status-ok"><div class="status-dot"></div>OK \u2014 diferenta sub 5%</div>';
    else if (diff > 0) sh = '<div class="status-badge status-warn"><div class="status-dot"></div>DFDS > PTV \u2014 verificare necesara</div>';
    else               sh = '<div class="status-badge status-warn"><div class="status-dot"></div>PTV > DFDS \u2014 posibila subraportare</div>';
    document.getElementById('s-status').innerHTML = sh;
    statusSection.style.display = '';
  } else {
    statusSection.style.display = 'none';
  }

  // Lista opriri
  const stopList = document.getElementById('stop-list');
  stopList.innerHTML = '';
  const mc = ['#2d7dd2','#e8a020','#2ecc71','#9b59b6','#e74c3c'];
  for (let i = 0; i < r.cities.length; i++) {
    const el = document.createElement('div');
    el.className = 'stop-item';
    const lat = r.lats[i] || 0, lon = r.lons[i] || 0;
    el.innerHTML = '<div class="stop-dot">' + (i+1) + '</div><div>' +
      '<div class="stop-name">' + r.cities[i] + '</div>' +
      '<div class="stop-coords">' + lat.toFixed(4) + ', ' + lon.toFixed(4) + '</div>' +
      '</div>';
    stopList.appendChild(el);
  }

  // Harta
  updateMap(r);
}

// ── HARTA ──────────────────────────────────────────────────
function updateMap(r) {
  routeLayerGroup.clearLayers();
  markerLayerGroup.clearLayers();
  document.getElementById('map-loading').style.display = 'flex';

  const waypoints = r.lats.map((lat, i) => [lat, r.lons[i]]);
  if (waypoints.length < 2) {
    document.getElementById('map-loading').style.display = 'none';
    return;
  }

  // Linii drepte placeholder
  const shadow = L.polyline(waypoints, { color:'#000', weight:9, opacity:0.12, lineJoin:'round', lineCap:'round' });
  const line   = L.polyline(waypoints, { color:'#e8500a', weight:5, opacity:1, lineJoin:'round', lineCap:'round' });
  routeLayerGroup.addLayer(shadow);
  routeLayerGroup.addLayer(line);
  map.fitBounds(waypoints, {padding:[50,50]});

  // Markeri
  addMarkers(r);
  document.getElementById('map-loading').style.display = 'none';

  // OSRM traseu real
  const coordsStr = r.lats.map((lat, i) => r.lons[i] + ',' + lat).join(';');
  const osrmUrl = 'https://router.project-osrm.org/route/v1/driving/' + coordsStr +
                  '?overview=full&geometries=geojson&steps=false';

  fetch(osrmUrl)
    .then(res => { if (!res.ok) throw new Error('HTTP ' + res.status); return res.json(); })
    .then(data => {
      if (!data.routes || !data.routes[0]) return;
      const roadCoords = data.routes[0].geometry.coordinates.map(c => [c[1], c[0]]);
      routeLayerGroup.clearLayers();
      routeLayerGroup.addLayer(L.polyline(roadCoords, { color:'#000', weight:9, opacity:0.12, lineJoin:'round', lineCap:'round' }));
      routeLayerGroup.addLayer(L.polyline(roadCoords, { color:'#e8500a', weight:5, opacity:1, lineJoin:'round', lineCap:'round' }));
      markerLayerGroup.clearLayers();
      addMarkers(r);
      map.fitBounds(roadCoords, {padding:[50,50]});
    })
    .catch(() => { /* raman liniile drepte */ });
}

function addMarkers(r) {
  const mc = ['#2d7dd2','#e8a020','#2ecc71','#9b59b6','#e74c3c'];
  for (let i = 0; i < r.cities.length; i++) {
    const col = i === 0 ? '#2d7dd2' : i === r.cities.length-1 ? '#0f1f3d' : mc[i % mc.length];
    const icon = L.divIcon({
      className: '',
      html: '<div style="background:' + col + ';color:white;border-radius:50%;width:28px;height:28px;' +
            'display:flex;align-items:center;justify-content:center;font-family:monospace;' +
            'font-size:11px;font-weight:600;border:2px solid white;box-shadow:0 2px 8px rgba(0,0,0,0.5)">' + (i+1) + '</div>',
      iconAnchor: [14, 14]
    });
    L.marker([r.lats[i], r.lons[i]], {icon, zIndexOffset:1000})
      .addTo(markerLayerGroup)
      .bindPopup('<b>' + r.cities[i] + '</b><br><small>' + r.lats[i].toFixed(5) + ', ' + r.lons[i].toFixed(5) + '</small>');
  }
}

// Navigare cu tastatura
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft')  navigate(-1);
  if (e.key === 'ArrowRight') navigate(+1);
});
</script>
